name: Monthly Full History Release

on:
  schedule:
    - cron: "0 3 1 * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  full-archive:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Rebuild full local history from all incremental releases
        run: python rebuild_full_history.py

      - name: Set release tag
        id: vars
        run: echo "tag=full-history-$(date -u +'%Y-%m')" >> "$GITHUB_OUTPUT"

      - name: Zip full history per coin
        run: |
          mkdir -p release_assets
          for coin_dir in data/HitBTC_Intraday_Data/*/; do
            [ -d "$coin_dir" ] || continue
            coin=$(basename "$coin_dir")
            zip -r "release_assets/${coin}_${{ steps.vars.outputs.tag }}.zip" "$coin_dir"
          done
          ls -la release_assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: "HitBTC full history ${{ steps.vars.outputs.tag }}"
          body: |
            Complete historical dataset snapshot reconstructed from incremental releases.
            This monthly release is the recommended citable archive for Zenodo.
          files: release_assets/*.zip
